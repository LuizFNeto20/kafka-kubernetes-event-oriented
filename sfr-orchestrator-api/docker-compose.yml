networks:
  network-orchestrator:
    driver: bridge

services:
  db-orchestrator:
    image: postgres:15
    container_name: db-orchestrator
    environment:
      POSTGRES_DB: db-orchestrator
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5433:5432"
    volumes:
      - pgdata-orchestrator:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d db-orchestrator"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - network-orchestrator

  sfr-orchestrator-api:
    build: .
    container_name: sfr-orchestrator-api
    ports:
      - "8080:8080"
    depends_on:
      - db-orchestrator
    environment:
      # Database configuration
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db-orchestrator:5432/db-orchestrator
      - SPRING_DATASOURCE_USERNAME=user
      - SPRING_DATASOURCE_PASSWORD=password

      # Schema Registry configuration
      - SCHEMA_REGISTRY_URL=http://schema-registry:8081

      # Kafka configuration
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - KAFKA_TOPIC_PACKAGE_DELIVERY=package-delivery-topic
    networks:
      - network-orchestrator
      - network-kafka

volumes:
  pgdata-orchestrator:
